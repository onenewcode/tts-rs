[package]
name = "tts_cli"
version = "0.1.0"
edition = "2024"

[features]
default = ["flex", "fusion"]
fusion = ["tts_qwen/fusion"]
flex = ["tts_qwen/flex"]
wgpu = ["tts_qwen/wgpu"]
cuda = ["tts_qwen/cuda"]
rocm = ["tts_qwen/rocm"]
metal = ["tts_qwen/metal"]
vulkan = ["tts_qwen/vulkan"]
webgpu = ["tts_qwen/webgpu"]

[dependencies]
clap = { workspace = true }
serde = { workspace = true }
serde_yaml = { workspace = true }
tts_core = { path = "../tts_core" }
tts_qwen = { path = "../tts_qwen", default-features = false }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

[[bin]]
name = "tts_cli"
path = "src/main.rs"
